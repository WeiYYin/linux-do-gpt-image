<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>提示词图片展示</title>
        <style>
            :root {
                --bg: #f6f0e8;
                --paper: rgba(255, 251, 246, 0.92);
                --card: rgba(255, 255, 255, 0.88);
                --text: #2c231d;
                --muted: #716256;
                --accent: #b44c2f;
                --accent-strong: #8e351d;
                --line: rgba(105, 79, 60, 0.18);
                --shadow: 0 18px 45px rgba(71, 45, 25, 0.12);
                --radius: 22px;
                --gallery-image-height: 260px;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                color: var(--text);
                font-family:
                    "Segoe UI", "PingFang SC", "Hiragino Sans GB",
                    "Microsoft YaHei", sans-serif;
                background:
                    radial-gradient(
                        circle at top left,
                        rgba(208, 116, 80, 0.18),
                        transparent 28%
                    ),
                    radial-gradient(
                        circle at top right,
                        rgba(191, 150, 89, 0.16),
                        transparent 26%
                    ),
                    linear-gradient(180deg, #fbf5ee 0%, var(--bg) 100%);
                min-height: 100vh;
            }

            .shell {
                width: min(1440px, calc(100vw - 32px));
                margin: 24px auto 40px;
            }

            .hero {
                padding: 28px;
                border: 1px solid var(--line);
                border-radius: 30px;
                background:
                    linear-gradient(
                        135deg,
                        rgba(255, 248, 240, 0.92),
                        rgba(245, 234, 223, 0.84)
                    ),
                    repeating-linear-gradient(
                        -45deg,
                        rgba(180, 76, 47, 0.03) 0,
                        rgba(180, 76, 47, 0.03) 10px,
                        rgba(255, 255, 255, 0) 10px,
                        rgba(255, 255, 255, 0) 20px
                    );
                box-shadow: var(--shadow);
                position: sticky;
                top: 12px;
                z-index: 20;
                backdrop-filter: blur(14px);
            }

            .eyebrow {
                font-size: 12px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--accent);
                margin-bottom: 10px;
                font-weight: 700;
            }

            h1 {
                margin: 0;
                font-size: clamp(28px, 4vw, 48px);
                line-height: 1.02;
                font-weight: 800;
            }

            .subtext {
                margin: 12px 0 0;
                color: var(--muted);
                font-size: 15px;
                line-height: 1.6;
                max-width: 860px;
            }

            .toolbar {
                display: grid;
                grid-template-columns:
                    minmax(0, 1.8fr) minmax(180px, 0.7fr)
                    auto auto auto;
                gap: 12px;
                margin-top: 22px;
            }

            .input,
            .select,
            .button {
                border-radius: 16px;
                border: 1px solid var(--line);
                background: rgba(255, 255, 255, 0.8);
                color: var(--text);
                min-height: 48px;
                font-size: 14px;
            }

            .input,
            .select {
                padding: 0 14px;
                width: 100%;
                outline: none;
            }

            .input:focus,
            .select:focus {
                border-color: rgba(180, 76, 47, 0.45);
                box-shadow: 0 0 0 4px rgba(180, 76, 47, 0.12);
            }

            .button {
                padding: 0 16px;
                cursor: pointer;
                font-weight: 700;
                transition:
                    transform 120ms ease,
                    background 120ms ease,
                    border-color 120ms ease;
            }

            .button:hover {
                transform: translateY(-1px);
                border-color: rgba(180, 76, 47, 0.4);
            }

            .button:disabled {
                cursor: not-allowed;
                opacity: 0.55;
                transform: none;
            }

            .button.primary {
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent-strong)
                );
                color: #fffaf4;
                border-color: transparent;
            }

            .stats {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 16px;
            }

            .stat {
                padding: 10px 14px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.72);
                border: 1px solid var(--line);
                font-size: 13px;
                color: var(--muted);
            }

            .notice {
                margin-top: 14px;
                padding: 12px 14px;
                border-radius: 16px;
                background: rgba(255, 244, 232, 0.88);
                border: 1px dashed rgba(180, 76, 47, 0.36);
                color: var(--muted);
                font-size: 13px;
                line-height: 1.6;
                display: none;
            }

            .gallery {
                column-count: 4;
                column-gap: 18px;
                margin-top: 22px;
            }

            .card {
                display: inline-block;
                width: 100%;
                background: var(--card);
                border: 1px solid var(--line);
                border-radius: var(--radius);
                overflow: hidden;
                box-shadow: var(--shadow);
                margin: 0 0 18px;
                break-inside: avoid;
                vertical-align: top;
            }

            .media {
                position: relative;
                background: linear-gradient(
                    135deg,
                    rgba(209, 189, 172, 0.85),
                    rgba(240, 231, 221, 0.85)
                );
                overflow: hidden;
            }

            .media-button {
                width: 100%;
                height: var(--gallery-image-height);
                border: 0;
                padding: 0;
                margin: 0;
                background: transparent;
                display: block;
                cursor: zoom-in;
            }

            .media img {
                width: 100%;
                height: var(--gallery-image-height);
                display: block;
                object-fit: cover;
                object-position: center;
            }

            .media-empty {
                min-height: var(--gallery-image-height);
                display: grid;
                place-items: center;
                color: var(--muted);
                font-size: 14px;
                letter-spacing: 0.04em;
            }

            .media-overlay {
                position: absolute;
                left: 12px;
                right: 12px;
                bottom: 12px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 160ms ease,
                    transform 160ms ease;
                pointer-events: none;
            }

            .card:hover .media-overlay,
            .card:focus-within .media-overlay {
                opacity: 1;
                transform: translateY(0);
            }

            .media-cta,
            .media-sub {
                backdrop-filter: blur(10px);
                background: rgba(35, 24, 16, 0.72);
                color: #fff8ef;
                border-radius: 999px;
                padding: 8px 11px;
                font-size: 12px;
            }

            .media-sub {
                background: rgba(255, 250, 244, 0.9);
                color: var(--accent-strong);
            }

            .media-badge {
                position: absolute;
                top: 12px;
                right: 12px;
                padding: 8px 10px;
                border-radius: 999px;
                background: rgba(35, 24, 16, 0.72);
                color: #fff8ef;
                font-size: 12px;
                backdrop-filter: blur(8px);
            }

            .content {
                padding: 16px 16px 18px;
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .meta {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                color: var(--muted);
                font-size: 13px;
            }

            .user {
                font-weight: 700;
                color: var(--accent-strong);
            }

            .prompt {
                margin: 0;
                white-space: pre-wrap;
                line-height: 1.7;
                font-size: 14px;
                color: var(--text);
                flex: 1;
            }

            .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .actions .button {
                flex: 1 1 140px;
                min-height: 42px;
                font-size: 13px;
                text-align: center;
                line-height: 42px;
            }

            .button.subtle {
                background: rgba(255, 248, 241, 0.9);
            }

            .empty {
                margin-top: 22px;
                padding: 46px 22px;
                border: 1px dashed var(--line);
                border-radius: 28px;
                text-align: center;
                color: var(--muted);
                background: rgba(255, 255, 255, 0.66);
                display: none;
            }

            .copy-toast {
                position: fixed;
                right: 20px;
                bottom: 20px;
                padding: 12px 16px;
                border-radius: 14px;
                background: rgba(35, 24, 16, 0.88);
                color: #fff7ef;
                font-size: 13px;
                opacity: 0;
                transform: translateY(8px);
                transition:
                    opacity 160ms ease,
                    transform 160ms ease;
                pointer-events: none;
                z-index: 40;
            }

            .copy-toast.show {
                opacity: 1;
                transform: translateY(0);
            }

            .lightbox {
                position: fixed;
                inset: 0;
                background: rgba(22, 14, 10, 0.86);
                backdrop-filter: blur(12px);
                display: none;
                align-items: center;
                justify-content: center;
                padding: 24px;
                z-index: 60;
            }

            .lightbox.show {
                display: flex;
            }

            .lightbox-panel {
                width: min(1200px, 100%);
                max-height: calc(100vh - 48px);
                display: grid;
                grid-template-columns: minmax(0, 1fr) 300px;
                gap: 18px;
                align-items: start;
            }

            .lightbox-stage {
                position: relative;
                background: rgba(255, 250, 244, 0.08);
                border: 1px solid rgba(255, 247, 239, 0.12);
                border-radius: 28px;
                padding: 20px;
                display: grid;
                place-items: center;
                min-height: 480px;
            }

            .lightbox-stage img {
                max-width: 100%;
                max-height: calc(100vh - 120px);
                border-radius: 18px;
                object-fit: contain;
                box-shadow: 0 24px 50px rgba(0, 0, 0, 0.26);
            }

            .lightbox-side {
                background: rgba(255, 250, 244, 0.95);
                border-radius: 26px;
                border: 1px solid rgba(255, 247, 239, 0.5);
                padding: 16px;
                color: var(--text);
                max-height: calc(100vh - 48px);
                overflow: auto;
                box-shadow: var(--shadow);
            }

            .lightbox-topbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
                margin-bottom: 14px;
            }

            .lightbox-title {
                font-size: 15px;
                font-weight: 800;
                color: var(--accent-strong);
            }

            .icon-button {
                border: 1px solid var(--line);
                background: rgba(255, 255, 255, 0.9);
                color: var(--text);
                min-width: 42px;
                min-height: 42px;
                border-radius: 14px;
                cursor: pointer;
                font-size: 18px;
            }

            .lightbox-prompt {
                font-size: 13px;
                line-height: 1.7;
                color: var(--muted);
                background: rgba(245, 239, 232, 0.95);
                border-radius: 18px;
                padding: 12px;
                margin-bottom: 14px;
                white-space: pre-wrap;
            }

            .lightbox-actions {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-bottom: 14px;
            }

            .lightbox-actions .button {
                flex: 1 1 120px;
                min-height: 42px;
                text-align: center;
                line-height: 42px;
            }

            .thumb-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px;
            }

            .thumb {
                border: 2px solid transparent;
                background: transparent;
                padding: 0;
                border-radius: 16px;
                overflow: hidden;
                cursor: pointer;
            }

            .thumb.active {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(180, 76, 47, 0.15);
            }

            .thumb img {
                width: 100%;
                aspect-ratio: 1 / 1;
                object-fit: cover;
                display: block;
            }

            .stage-nav {
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 46px;
                height: 46px;
                border-radius: 999px;
                border: 0;
                background: rgba(23, 16, 11, 0.6);
                color: #fff8ef;
                cursor: pointer;
                font-size: 22px;
            }

            .stage-nav.prev {
                left: 14px;
            }

            .stage-nav.next {
                right: 14px;
            }

            .stage-count {
                position: absolute;
                left: 20px;
                top: 20px;
                padding: 8px 12px;
                border-radius: 999px;
                background: rgba(23, 16, 11, 0.66);
                color: #fff8ef;
                font-size: 12px;
            }

            @media (max-width: 1200px) {
                .gallery {
                    column-count: 3;
                }
            }

            @media (max-width: 920px) {
                .toolbar {
                    grid-template-columns: 1fr 1fr;
                }

                .gallery {
                    column-count: 2;
                }

                .lightbox-panel {
                    grid-template-columns: 1fr;
                }

                .lightbox-stage {
                    min-height: 360px;
                }
            }

            @media (max-width: 640px) {
                :root {
                    --gallery-image-height: 220px;
                }

                .shell {
                    width: min(100vw - 20px, 100%);
                    margin: 10px auto 24px;
                }

                .hero {
                    padding: 20px;
                    position: static;
                }

                .toolbar {
                    grid-template-columns: 1fr;
                }

                .gallery {
                    column-count: 1;
                }

                .lightbox {
                    padding: 10px;
                }

                .lightbox-stage {
                    padding: 12px;
                    min-height: 280px;
                }

                .thumb-grid {
                    grid-template-columns: repeat(3, minmax(0, 1fr));
                }
            }
        </style>
    </head>
    <body>
        <main class="shell">
            <section class="hero">
                <div class="eyebrow">Prompt Gallery</div>
                <h1>提示词与图片展示页</h1>
                <p class="subtext">
                    页面默认读取同目录下的
                    <code>linux_do_2036927_prompts_images.filtered.json</code>，
                    支持关键词搜索、用户名筛选、单条提示词复制，以及复制当前筛选结果中的全部提示词。
                </p>

                <div class="toolbar">
                    <input
                        id="searchInput"
                        class="input"
                        type="search"
                        placeholder="搜索提示词、用户名、楼层号"
                    />
                    <select
                        id="userFilter"
                        class="select"
                        aria-label="按用户名筛选"
                    >
                        <option value="">全部用户</option>
                    </select>
                    <button id="pickFileBtn" class="button" type="button">
                        手动选择 JSON
                    </button>
                    <button id="copyVisibleBtn" class="button" type="button">
                        复制当前筛选提示词
                    </button>
                    <button id="reloadBtn" class="button primary" type="button">
                        重新读取 JSON
                    </button>
                </div>

                <input
                    id="fileInput"
                    type="file"
                    accept=".json,application/json"
                    hidden
                />

                <div class="stats">
                    <div class="stat" id="totalStat">总条目 0</div>
                    <div class="stat" id="visibleStat">当前展示 0</div>
                    <div class="stat" id="userStat">用户数 0</div>
                </div>

                <div id="notice" class="notice"></div>
            </section>

            <section id="gallery" class="gallery" aria-live="polite"></section>
            <section id="empty" class="empty">
                没有匹配结果，试试换个关键词或清空筛选条件。
            </section>
        </main>

        <div id="toast" class="copy-toast">已复制</div>
        <div id="lightbox" class="lightbox" aria-hidden="true">
            <div class="lightbox-panel">
                <div class="lightbox-stage">
                    <div id="lightboxCount" class="stage-count"></div>
                    <button
                        id="lightboxPrev"
                        class="stage-nav prev"
                        type="button"
                        aria-label="上一张"
                    >
                        ‹
                    </button>
                    <img id="lightboxImage" alt="预览大图" />
                    <button
                        id="lightboxNext"
                        class="stage-nav next"
                        type="button"
                        aria-label="下一张"
                    >
                        ›
                    </button>
                </div>
                <aside class="lightbox-side">
                    <div class="lightbox-topbar">
                        <div id="lightboxTitle" class="lightbox-title">
                            图片预览
                        </div>
                        <button
                            id="lightboxClose"
                            class="icon-button"
                            type="button"
                            aria-label="关闭"
                        >
                            ×
                        </button>
                    </div>
                    <div id="lightboxPrompt" class="lightbox-prompt"></div>
                    <div class="lightbox-actions">
                        <button
                            id="lightboxCopyBtn"
                            class="button"
                            type="button"
                        >
                            复制提示词
                        </button>
                        <a
                            id="lightboxRawBtn"
                            class="button primary"
                            href="#"
                            target="_blank"
                            rel="noreferrer noopener"
                            >原图新开</a
                        >
                    </div>
                    <div id="thumbGrid" class="thumb-grid"></div>
                </aside>
            </div>
        </div>

        <script>
            const DATA_URL = "./linux_do_2036927_prompts_images.filtered.json";

            const state = {
                items: [],
                filtered: [],
                users: [],
            };

            const searchInput = document.getElementById("searchInput");
            const userFilter = document.getElementById("userFilter");
            const pickFileBtn = document.getElementById("pickFileBtn");
            const copyVisibleBtn = document.getElementById("copyVisibleBtn");
            const reloadBtn = document.getElementById("reloadBtn");
            const fileInput = document.getElementById("fileInput");
            const gallery = document.getElementById("gallery");
            const empty = document.getElementById("empty");
            const notice = document.getElementById("notice");
            const toast = document.getElementById("toast");
            const totalStat = document.getElementById("totalStat");
            const visibleStat = document.getElementById("visibleStat");
            const userStat = document.getElementById("userStat");
            const lightbox = document.getElementById("lightbox");
            const lightboxImage = document.getElementById("lightboxImage");
            const lightboxTitle = document.getElementById("lightboxTitle");
            const lightboxPrompt = document.getElementById("lightboxPrompt");
            const lightboxCount = document.getElementById("lightboxCount");
            const lightboxCopyBtn = document.getElementById("lightboxCopyBtn");
            const lightboxRawBtn = document.getElementById("lightboxRawBtn");
            const lightboxPrev = document.getElementById("lightboxPrev");
            const lightboxNext = document.getElementById("lightboxNext");
            const lightboxClose = document.getElementById("lightboxClose");
            const thumbGrid = document.getElementById("thumbGrid");

            const lightboxState = {
                item: null,
                index: 0,
            };

            async function loadData() {
                notice.style.display = "none";
                notice.textContent = "";

                try {
                    const response = await fetch(DATA_URL, {
                        cache: "no-store",
                    });
                    if (!response.ok) {
                        throw new Error("HTTP " + response.status);
                    }

                    const data = await response.json();
                    if (!Array.isArray(data)) {
                        throw new Error("JSON 顶层不是数组");
                    }

                    state.items = data;
                    state.users = [
                        ...new Set(
                            data.map((item) => item.username).filter(Boolean),
                        ),
                    ].sort((a, b) => a.localeCompare(b));
                    buildUserOptions();
                    applyFilters();
                } catch (error) {
                    state.items = [];
                    state.filtered = [];
                    buildUserOptions();
                    render();

                    notice.innerHTML =
                        "读取 JSON 失败：<strong>" +
                        escapeHtml(String(error.message || error)) +
                        "</strong><br>" +
                        "如果你是直接双击打开 HTML，浏览器可能会拦截本地 <code>fetch</code>。建议用本地静态服务器打开，或在支持本地文件读取的环境里访问。";
                    notice.style.display = "block";
                }
            }

            function loadDataFromObject(data) {
                if (!Array.isArray(data)) {
                    throw new Error("JSON 顶层不是数组");
                }

                state.items = data;
                state.users = [
                    ...new Set(
                        data.map((item) => item.username).filter(Boolean),
                    ),
                ].sort((a, b) => a.localeCompare(b));
                buildUserOptions();
                applyFilters();
                notice.style.display = "none";
                notice.textContent = "";
            }

            function buildUserOptions() {
                const currentValue = userFilter.value;
                userFilter.innerHTML = '<option value="">全部用户</option>';

                for (const username of state.users) {
                    const option = document.createElement("option");
                    option.value = username;
                    option.textContent = username;
                    userFilter.appendChild(option);
                }

                if (state.users.includes(currentValue)) {
                    userFilter.value = currentValue;
                }
            }

            function applyFilters() {
                const keyword = searchInput.value.trim().toLowerCase();
                const selectedUser = userFilter.value;

                state.filtered = state.items.filter((item) => {
                    const username = String(item.username || "");
                    const prompt = String(item.prompt || "");
                    const postNumber = String(item.post_number || "");
                    const matchUser =
                        !selectedUser || username === selectedUser;
                    const matchKeyword =
                        !keyword ||
                        username.toLowerCase().includes(keyword) ||
                        prompt.toLowerCase().includes(keyword) ||
                        postNumber.includes(keyword);

                    return matchUser && matchKeyword;
                });

                render();
            }

            function render() {
                totalStat.textContent = "总条目 " + state.items.length;
                visibleStat.textContent = "当前展示 " + state.filtered.length;
                userStat.textContent = "用户数 " + state.users.length;

                gallery.innerHTML = "";
                empty.style.display = state.filtered.length ? "none" : "block";

                const fragment = document.createDocumentFragment();

                for (const item of state.filtered) {
                    fragment.appendChild(createCard(item));
                }

                gallery.appendChild(fragment);
            }

            function createCard(item) {
                const card = document.createElement("article");
                card.className = "card";

                const media = document.createElement("div");
                media.className = "media";

                const images = Array.isArray(item.images)
                    ? item.images.filter(Boolean)
                    : [];
                const firstImage = images.length ? images[0] : "";
                if (firstImage) {
                    const mediaButton = document.createElement("button");
                    mediaButton.className = "media-button";
                    mediaButton.type = "button";
                    mediaButton.setAttribute(
                        "aria-label",
                        images.length > 1 ? "查看组图" : "查看大图",
                    );
                    mediaButton.addEventListener("click", () =>
                        openLightbox(item, 0),
                    );

                    const img = document.createElement("img");
                    img.src = firstImage;
                    img.alt = "post " + item.post_number;
                    img.loading = "lazy";
                    img.referrerPolicy = "no-referrer";
                    mediaButton.appendChild(img);
                    media.appendChild(mediaButton);
                } else {
                    const placeholder = document.createElement("div");
                    placeholder.className = "media-empty";
                    placeholder.textContent = "暂无图片";
                    media.appendChild(placeholder);
                }

                const badge = document.createElement("div");
                badge.className = "media-badge";
                badge.textContent = images.length + " 图";
                media.appendChild(badge);

                if (firstImage) {
                    const overlay = document.createElement("div");
                    overlay.className = "media-overlay";
                    overlay.innerHTML =
                        '<span class="media-cta">' +
                        (images.length > 1 ? "查看组图" : "查看大图") +
                        "</span>" +
                        '<span class="media-sub">点击放大</span>';
                    media.appendChild(overlay);
                }

                const content = document.createElement("div");
                content.className = "content";

                const meta = document.createElement("div");
                meta.className = "meta";
                meta.innerHTML =
                    '<span class="user">@' +
                    escapeHtml(String(item.username || "unknown")) +
                    "</span>" +
                    "<span>#" +
                    escapeHtml(String(item.post_number || "")) +
                    "</span>";

                const prompt = document.createElement("p");
                prompt.className = "prompt";
                prompt.textContent = String(item.prompt || "");

                const actions = document.createElement("div");
                actions.className = "actions";

                const copyBtn = document.createElement("button");
                copyBtn.className = "button";
                copyBtn.type = "button";
                copyBtn.textContent = "复制提示词";
                copyBtn.addEventListener("click", async () => {
                    await copyText(String(item.prompt || ""));
                });

                const viewBtn = document.createElement(
                    firstImage ? "button" : "button",
                );
                viewBtn.className = "button primary";
                viewBtn.type = "button";
                viewBtn.textContent =
                    images.length > 1 ? "查看组图" : "查看图片";
                if (firstImage) {
                    viewBtn.addEventListener("click", () =>
                        openLightbox(item, 0),
                    );
                } else {
                    viewBtn.disabled = true;
                }

                const rawBtn = document.createElement("a");
                rawBtn.className = "button subtle";
                rawBtn.textContent = "原图新开";
                rawBtn.href = firstImage || "#";
                rawBtn.target = "_blank";
                rawBtn.rel = "noreferrer noopener";
                if (!firstImage) {
                    rawBtn.style.pointerEvents = "none";
                    rawBtn.style.opacity = "0.55";
                }

                actions.append(copyBtn, viewBtn, rawBtn);
                content.append(meta, prompt, actions);
                card.append(media, content);

                return card;
            }

            function openLightbox(item, startIndex) {
                const images = Array.isArray(item.images)
                    ? item.images.filter(Boolean)
                    : [];
                if (!images.length) {
                    showToast("这条没有图片");
                    return;
                }

                lightboxState.item = item;
                lightboxState.index = Math.max(
                    0,
                    Math.min(startIndex, images.length - 1),
                );
                renderLightbox();
                lightbox.classList.add("show");
                lightbox.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
            }

            function closeLightbox() {
                lightbox.classList.remove("show");
                lightbox.setAttribute("aria-hidden", "true");
                document.body.style.overflow = "";
            }

            function shiftLightbox(step) {
                const item = lightboxState.item;
                const images =
                    item && Array.isArray(item.images)
                        ? item.images.filter(Boolean)
                        : [];
                if (!images.length) {
                    return;
                }

                lightboxState.index =
                    (lightboxState.index + step + images.length) %
                    images.length;
                renderLightbox();
            }

            function renderLightbox() {
                const item = lightboxState.item;
                const images =
                    item && Array.isArray(item.images)
                        ? item.images.filter(Boolean)
                        : [];
                if (!item || !images.length) {
                    closeLightbox();
                    return;
                }

                const current = images[lightboxState.index];
                lightboxImage.src = current;
                lightboxImage.referrerPolicy = "no-referrer";
                lightboxTitle.textContent =
                    "#" +
                    item.post_number +
                    " @" +
                    (item.username || "unknown");
                lightboxPrompt.textContent = String(item.prompt || "");
                lightboxCount.textContent =
                    lightboxState.index + 1 + " / " + images.length;
                lightboxRawBtn.href = current;
                lightboxPrev.style.display =
                    images.length > 1 ? "inline-flex" : "none";
                lightboxNext.style.display =
                    images.length > 1 ? "inline-flex" : "none";

                thumbGrid.innerHTML = "";
                images.forEach((src, index) => {
                    const thumb = document.createElement("button");
                    thumb.className =
                        "thumb" +
                        (index === lightboxState.index ? " active" : "");
                    thumb.type = "button";
                    thumb.addEventListener("click", () => {
                        lightboxState.index = index;
                        renderLightbox();
                    });

                    const img = document.createElement("img");
                    img.src = src;
                    img.alt = "thumb " + (index + 1);
                    img.loading = "lazy";
                    img.referrerPolicy = "no-referrer";
                    thumb.appendChild(img);
                    thumbGrid.appendChild(thumb);
                });
            }

            async function copyText(text) {
                if (!text) {
                    showToast("没有可复制的提示词");
                    return;
                }

                try {
                    await navigator.clipboard.writeText(text);
                    showToast("提示词已复制");
                } catch (error) {
                    const textarea = document.createElement("textarea");
                    textarea.value = text;
                    textarea.style.position = "fixed";
                    textarea.style.opacity = "0";
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand("copy");
                    textarea.remove();
                    showToast("提示词已复制");
                }
            }

            async function copyVisiblePrompts() {
                if (!state.filtered.length) {
                    showToast("当前没有可复制内容");
                    return;
                }

                const payload = state.filtered
                    .map(
                        (item) =>
                            "#" +
                            item.post_number +
                            " @" +
                            (item.username || "") +
                            "\n" +
                            (item.prompt || ""),
                    )
                    .join("\n\n--------------------\n\n");

                await copyText(payload);
            }

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add("show");
                clearTimeout(showToast.timer);
                showToast.timer = setTimeout(() => {
                    toast.classList.remove("show");
                }, 1600);
            }

            function escapeHtml(value) {
                return value
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll('"', "&quot;")
                    .replaceAll("'", "&#39;");
            }

            searchInput.addEventListener("input", applyFilters);
            userFilter.addEventListener("change", applyFilters);
            pickFileBtn.addEventListener("click", () => fileInput.click());
            copyVisibleBtn.addEventListener("click", copyVisiblePrompts);
            reloadBtn.addEventListener("click", loadData);
            lightboxCopyBtn.addEventListener("click", () =>
                copyText(String(lightboxState.item?.prompt || "")),
            );
            lightboxPrev.addEventListener("click", () => shiftLightbox(-1));
            lightboxNext.addEventListener("click", () => shiftLightbox(1));
            lightboxClose.addEventListener("click", closeLightbox);
            lightbox.addEventListener("click", (event) => {
                if (event.target === lightbox) {
                    closeLightbox();
                }
            });
            document.addEventListener("keydown", (event) => {
                if (!lightbox.classList.contains("show")) {
                    return;
                }

                if (event.key === "Escape") {
                    closeLightbox();
                } else if (event.key === "ArrowLeft") {
                    shiftLightbox(-1);
                } else if (event.key === "ArrowRight") {
                    shiftLightbox(1);
                }
            });
            fileInput.addEventListener("change", async (event) => {
                const file = event.target.files && event.target.files[0];
                if (!file) {
                    return;
                }

                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    loadDataFromObject(data);
                    showToast("JSON 已手动加载");
                } catch (error) {
                    notice.innerHTML =
                        "手动读取 JSON 失败：<strong>" +
                        escapeHtml(String(error.message || error)) +
                        "</strong>";
                    notice.style.display = "block";
                } finally {
                    fileInput.value = "";
                }
            });

            loadData();
        </script>
    </body>
</html>
